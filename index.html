    <div class="app">
      <div id="map"></div>

      <aside class="sidebar">
        <div id="placeholder" class="placeholder">
          <p class="placeholder-text">
            <strong>Clique sur la carte</strong> pour en savoir plus sur les
            lieux de pratique et les activités concernées.
          </p>
          <div class="marker big">
            <svg class="marker-svg"><use href="#ico-marker"/></svg>
          </div>
        </div>

        <div id="location-card" class="location-card hidden">
          <button id="close-btn" class="close-btn">×</button>

          <div class="header">
            <div class="header-top">
              <div class="marker">
                <svg class="marker-svg"><use href="#ico-marker"/></svg>
              </div>
              <h1 id="title"></h1>
            </div>
          </div>

          <div class="section">
            <div id="activities"></div>
            <p id="description"></p>
          </div>

          <div class="section">
            <h4 class="section-title">
              <div class="marker sm">
                <svg class="marker-svg"><use href="#ico-marker"/></svg>
              </div>
              Infos pratiques :
            </h4>
            <ul id="infos"></ul>
          </div>

          <a id="link" href="#" class="btn">EN SAVOIR PLUS</a>
        </div>
      </aside>
    </div>

    <nav class="filter-bar">
      <p class="filter-label">
        Tu peux également <strong>filtrer les lieux</strong> selon les types
        d'activités qui t'intéressent :
      </p>

        <button class="filter-btn active" data-filter="COURS HEBDO">COURS HEBDO</button>

        <button class="filter-btn active" data-filter="STAGES PETITS CERCLES">STAGES PETITS CERCLES</button>

        <button class="filter-btn" data-filter="GROUPES DE PRATIQUE">GROUPES DE PRATIQUE</button>
      </div>
    </nav>
